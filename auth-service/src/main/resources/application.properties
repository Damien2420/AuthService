server.port=9000

# --- 專案自定義設定 ---
app.frontend-url=http://localhost:5173
# ---------------------

app.cookie.secure=false

# Cloudflare Turnstile
app.turnstile.enabled=true
app.turnstile.secret-key=${TURNSTILE_SECRET_KEY}

# --- Sentry Tunnel 設定 ---
# 允許轉發的 Sentry Project ID 白名單（從 DSN 路徑段取得，逗號分隔）
# DSN 範例：https://key@o123456.ingest.sentry.io/4511132322562048 → projectId 為 4511132322562048
app.sentry.allowed-project-ids=${SENTRY_ALLOWED_PROJECT_IDS:}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=login
spring.datasource.url=jdbc:postgresql://localhost:5432/login_app
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==================================
# GOOGLE OAUTH2 CLIENT CONFIGURATION
# ==================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# OAuth2 的 Google Scope 設定
spring.security.oauth2.client.registration.google.scope=openid, profile, email

# Google Client 回呼 URI
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/{action}/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post

# ==================================
# DISCORD OAUTH2 CLIENT CONFIGURATION
# ==================================
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/{action}/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# ==================================
# LINE OAUTH2 CLIENT CONFIGURATION
# ==================================
spring.security.oauth2.client.registration.line.client-id=${LINE_CLIENT_ID}
spring.security.oauth2.client.registration.line.client-secret=${LINE_CLIENT_SECRET}
spring.security.oauth2.client.registration.line.scope=openid,profile,email
spring.security.oauth2.client.registration.line.redirect-uri={baseUrl}/{action}/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.line.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.line.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.line.authorization-uri=https://access.line.me/oauth2/v2.1/authorize
spring.security.oauth2.client.provider.line.token-uri=https://api.line.me/oauth2/v2.1/token
spring.security.oauth2.client.provider.line.user-info-uri=https://api.line.me/oauth2/v2.1/userinfo
spring.security.oauth2.client.provider.line.user-name-attribute=sub

# --- Swagger UI 設定 ---
springdoc.swagger-ui.path=/swagger

# --- 日誌設定 ---
logging.level.root=INFO

# log 輸出的格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p --- [%15.15t] [%C.%M] [%X{traceId}] : %m%n

logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz

# --- 郵件設定 ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}

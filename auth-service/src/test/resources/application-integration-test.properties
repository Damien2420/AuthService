# =========================================================
# 整合測試專用設定
# 所有 ${ENV_VAR} 佔位符必須在此提供，避免 Spring context 啟動失敗
# DB 與 Redis 的連線參數會被 @DynamicPropertySource 以 Testcontainers 的值覆蓋
# =========================================================

# --- DB（佔位值，實際由 @DynamicPropertySource 覆蓋）---
DB_USERNAME=test
DB_PASSWORD=test

# --- Redis（佔位值，實際由 @DynamicPropertySource 覆蓋）---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- JWT ---
# 測試用密鑰
JWT_SECRET=dGVzdC1zZWNyZXQta2V5LWZvci1pbnRlZ3JhdGlvbi10ZXN0cy1vbmx5
JWT_EXPIRATION_MS=900000
JWT_REFRESH_EXPIRATION_MS=86400000

# --- Turnstile：整合測試停用人機驗證 ---
app.turnstile.enabled=false
TURNSTILE_SECRET_KEY=dummy-turnstile-secret

# --- OAuth2（佔位值，整合測試不測 OAuth2 流程）---
GOOGLE_CLIENT_ID=dummy-google-client-id
GOOGLE_CLIENT_SECRET=dummy-google-client-secret
DISCORD_CLIENT_ID=dummy-discord-client-id
DISCORD_CLIENT_SECRET=dummy-discord-client-secret
LINE_CLIENT_ID=dummy-line-client-id
LINE_CLIENT_SECRET=dummy-line-client-secret

# --- Mail（JavaMailSender 由 @MockitoBean 替換，實際不會發信）---
# Spring Boot 4 的 mail health contributor 無法偵測 mock bean，直接停用
management.health.mail.enabled=false
MAIL_USERNAME=test@example.com
MAIL_PASSWORD=dummy-mail-password
MAIL_FROM=test@example.com
MAIL_HOST=localhost
MAIL_PORT=25

# --- Sentry ---
SENTRY_ALLOWED_PROJECT_IDS=

# --- 測試環境關閉不必要的 log ---
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=WARN
# Docker Engine 29 將最低支援 API 版本從 1.32 提升至 1.44，
# 而 docker-java（Testcontainers 底層）預設仍使用 1.32，
# 導致連線時報錯：「client version 1.32 is too old. Minimum supported API version is 1.44」。
# 此設定強制 docker-java 使用 1.44，修復 Testcontainers 在 Docker Engine 29+ 環境下無法啟動容器的問題。
# 參考：https://github.com/docker-java/docker-java/issues/XXX
api.version=1.44